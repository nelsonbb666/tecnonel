<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="img/logo.png">

    <title>Centro de Ayuda - Tecnonel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #001f3f, #002855, #003366, #001428);
            background-size: 400% 400%;
            animation: rgbBlue 8s ease infinite;
        }
        
        @keyframes rgbBlue {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .contenedor {
            width: 90%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        
        h1 {
            color: white;
            margin-bottom: 25px;
        }
        
        input,
        textarea {
            width: 100%;
            background: white;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        #nombre {
            height: 50px;
        }
        
        #asunto {
            height: 60px;
        }
        
        #mensaje {
            height: 150px;
            resize: none;
        }
        
        .btn-enviar {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #00c853;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00ff88;
            transition: .3s;
        }
        
        .btn-enviar:hover {
            transform: scale(1.03);
        }
        
        .volver {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        
        .volver:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <h1>Centro de Ayuda Tecnonel</h1>

        <form action="https://formsubmit.co/tecnonel2026@gmail.com" method="POST">

            <input type="text" name="Nombre" id="nombre" placeholder="Ingresa tu nombre" required>

            <input type="text" name="Asunto" id="asunto" placeholder="Asunto" required>

            <textarea name="Mensaje" id="mensaje" placeholder="Describe tu consulta..." required></textarea>

            <input type="hidden" name="_captcha" value="false">

            <button class="btn-enviar" type="submit">
ENVIAR
</button>

        </form>

        <a href="index.html" class="volver">
⬅ Volver a la página principal
</a>

    </div>

</body>

</html>
